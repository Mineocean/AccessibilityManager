name: Build and Release ARM64 APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release"
        required: false
      release_name:
        description: "Release title"
        required: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (arm64-v8a)
        run: ./gradlew clean assembleRelease

      - name: Prepare release artifact
        id: prepare_apk
        shell: bash
        run: |
          mapfile -t APK_LIST < <(find app/build/outputs/apk/release -type f \( -name "app-release.apk" -o -name "app-release-*.apk" \))
          if [ "${#APK_LIST[@]}" -ne 1 ]; then
            echo "Expected one APK, found ${#APK_LIST[@]}."
            exit 1
          fi
          APK_PATH="${APK_LIST[0]}"
          DEST="app/build/outputs/apk/release/app-release-arm64-v8a.apk"
          cp "$APK_PATH" "$DEST"
          echo "asset_path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || format('arm64-v8a-{0}', github.run_number) }}
          name: ${{ github.event.inputs.release_name || format('arm64-v8a build #{0}', github.run_number) }}
          files: ${{ steps.prepare_apk.outputs.asset_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
