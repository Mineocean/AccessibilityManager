name: Build and Release ARM64 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release"
        required: false
      release_name:
        description: "Release title"
        required: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      APP_MODULE: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (arm64-v8a)
        run: ./gradlew assembleRelease

      - name: Find release APK
        id: find_apk
        shell: bash
        run: |
          APK_DIR="$APP_MODULE/build/outputs/apk/release"
          echo "Listing APK output directory:"
          ls -la "$APK_DIR"
          APK_PATH=$(find "$APK_DIR" -maxdepth 1 -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found in $APK_DIR"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          DEST="$APK_DIR/${APP_MODULE}-release-arm64-v8a.apk"
          cp "$APK_PATH" "$DEST"
          echo "asset_path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_MODULE }}-arm64-v8a
          path: ${{ steps.find_apk.outputs.asset_path }}

      - name: Publish release
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || format('arm64-v8a-{0}', github.run_number) }}
          name: ${{ github.event.inputs.release_name || format('arm64-v8a build #{0}', github.run_number) }}
          files: ${{ steps.find_apk.outputs.asset_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
