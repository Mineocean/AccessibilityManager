name: Build and Release ARM64 APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release"
        required: false
      release_name:
        description: "Release title"
        required: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (arm64-v8a)
        run: ./gradlew assembleRelease

      - name: Prepare release artifact
        id: prepare_apk
        run: |
          APK_PATH=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          DEST="app/build/outputs/apk/release/accessibilitymanager-arm64-v8a.apk"
          cp "$APK_PATH" "$DEST"
          echo "asset_path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || format('arm64-v8a-{0}', github.run_number) }}
          name: ${{ github.event.inputs.release_name || format('ARM64-v8a build #{0}', github.run_number) }}
          files: ${{ steps.prepare_apk.outputs.asset_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
